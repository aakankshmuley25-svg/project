<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Labs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI';
}

body{
    background:#f4f6f9;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#2c3e50,#1a2530);
    color:white;
    padding:15px 0;
}

.header-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:1200px;
    margin:auto;
}

/* MAIN LAYOUT */
.main-content{
    display:flex;
    max-width:1200px;
    margin:30px auto;
    gap:25px;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    padding:20px;
}

.sidebar h3{
    margin-bottom:15px;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

.nav-menu{
    list-style:none;
}

.nav-item{
    padding:12px;
    cursor:pointer;
    display:flex;
    gap:10px;
    border-left:4px solid transparent;
}

.nav-item:hover{
    background:#f0f7ff;
}

.nav-item.active{
    background:#e8f4fc;
    border-left:4px solid #3498db;
    color:#3498db;
}

/* CONTENT */
.content{
    flex:1;
    background:white;
    border-radius:10px;
    padding:25px;
}

/* CARDS */
.aim-sections{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:20px;
}

.section-card{
    background:#f8f9fa;
    padding:20px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.section-card:hover{
    transform:translateY(-5px);
}

.section-card.active{
    border:2px solid #3498db;
    background:#e8f4fc;
}

/* CONTENT AREA */
#contentArea{
    margin-top:30px;
    padding:20px;
    border-radius:10px;
    background:#f4f6f9;
    box-shadow:0 3px 8px rgba(0,0,0,0.05);
    line-height:1.6;
}

#contentArea ul,
#contentArea ol{
    margin-left:22px;
    margin-top:10px;
}

#contentArea li{
    margin-bottom:8px;
}

.question-box{
    margin:12px 0;
    padding:14px;
    border:1px solid #ddd;
    border-radius:8px;
    background:#f8f9fa;
}

.option{
    display:block;
    margin:8px 0;
}

/* INPUT */
input, textarea{
    width:100%;
    max-width:350px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea{
    min-height:90px;
    resize:vertical;
}

/* BUTTON */
button{
    padding:10px 20px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#247db5;
}
</style>
</head>

<body>

<header>
<div class="header-container">
    <h2>Virtual Labs</h2>
    <div>Welcome, Student</div>
</div>
</header>

<div class="main-content">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Navigation</h3>
    <ul class="nav-menu">
        <li class="nav-item active"><i class="fas fa-bullseye"></i> Aim</li>
        <li class="nav-item"><i class="fas fa-book"></i> Theory</li>
        <li class="nav-item"><i class="fas fa-question-circle"></i> Pretest</li>
        <li class="nav-item"><i class="fas fa-desktop"></i> Simulation</li>
        <li class="nav-item"><i class="fas fa-clipboard-check"></i> Posttest</li>
        <li class="nav-item"><i class="fas fa-users"></i> Contributors</li>
        <li class="nav-item"><i class="fas fa-book-open"></i> References</li>
        <li class="nav-item"><i class="fas fa-comment-dots"></i> Feedback</li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="content">

<h2>Virtual Lab on Euler's Theorem</h2>

<div class="aim-sections">

<div class="section-card active">
    <h3>Aim</h3>
</div>

<div class="section-card">
    <h3>Theory</h3>
</div>

<div class="section-card">
    <h3>Pretest</h3>
</div>

<div class="section-card">
    <h3>Simulation</h3>
</div>

<div class="section-card">
    <h3>Posttest</h3>
</div>
<div class="section-card">
    <h3>Contributors</h3>
</div>
<div class="section-card">
    <h3>References</h3>
</div>
<div class="section-card">
    <h3>Feedback</h3>
</div>
</div>

<!-- DYNAMIC CONTENT -->
<div id="contentArea"></div>

</div>
</div>

<script>

const sectionCards = document.querySelectorAll('.section-card');
const navItems = document.querySelectorAll('.nav-item');
const contentArea = document.getElementById("contentArea");

function showSection(sectionName) {
    sectionCards.forEach(card => {
        const cardName = card.querySelector("h3").innerText;
        card.classList.toggle("active", cardName === sectionName);
    });

    navItems.forEach(item => {
        const itemName = item.innerText.trim();
        item.classList.toggle("active", itemName === sectionName);
    });

    if (sectionName === "Aim") {
        contentArea.innerHTML = `
            <h2>Aim</h2>
            <p>To understand and verify Euler's Theorem using examples and an interactive calculator.</p>
        `;
    }

    else if (sectionName === "Theory") {
        contentArea.innerHTML = `
            <h2>Theory</h2>
            <p>Euler's Theorem states that if <b>a</b> and <b>n</b> are relatively prime, then:</p>
            <p><b>a<sup>φ(n)</sup> ≡ 1 (mod n)</b></p>
            <p>Here, φ(n) is Euler's totient function. It counts the positive integers less than n that are coprime to n.</p>
        `;
    }

    else if (sectionName === "Pretest") {
        contentArea.innerHTML = `
            <h2>Pretest</h2>
            <div class="question-box">
                <p><b>1. What is the value of φ(5)?</b></p>
                <label class="option"><input type="radio" name="pre1" value="3"> 3</label>
                <label class="option"><input type="radio" name="pre1" value="4"> 4</label>
                <label class="option"><input type="radio" name="pre1" value="5"> 5</label>
            </div>

            <div class="question-box">
                <p><b>2. Euler's Theorem applies when a and n are:</b></p>
                <label class="option"><input type="radio" name="pre2" value="equal"> Equal</label>
                <label class="option"><input type="radio" name="pre2" value="coprime"> Coprime</label>
                <label class="option"><input type="radio" name="pre2" value="even"> Even</label>
            </div>

            <button onclick="checkPretest()">Submit Pretest</button>
            <p id="pretestResult"></p>
        `;
    }

    else if (sectionName === "Simulation") {
        contentArea.innerHTML = `
            <h2>Euler Calculator</h2>
            <input id="a" placeholder="Enter a"><br><br>
            <input id="n" placeholder="Enter n"><br><br>
            <button onclick="calculateEuler()">Calculate</button>
            <p id="result"></p>
        `;
    }

    else if (sectionName === "Posttest") {
        contentArea.innerHTML = `
            <h2>Posttest</h2>
            <div class="question-box">
                <p><b>1. If a = 2 and n = 5, then 2<sup>φ(5)</sup> mod 5 is:</b></p>
                <label class="option"><input type="radio" name="post1" value="0"> 0</label>
                <label class="option"><input type="radio" name="post1" value="1"> 1</label>
                <label class="option"><input type="radio" name="post1" value="2"> 2</label>
            </div>

            <div class="question-box">
                <p><b>2. Euler's Theorem is useful in:</b></p>
                <label class="option"><input type="radio" name="post2" value="cryptography"> Cryptography</label>
                <label class="option"><input type="radio" name="post2" value="drawing"> Drawing</label>
                <label class="option"><input type="radio" name="post2" value="weather"> Weather forecasting</label>
            </div>

            <button onclick="checkPosttest()">Submit Posttest</button>
            <p id="posttestResult"></p>
        `;
    }

    else if (sectionName === "Contributors") {
        contentArea.innerHTML = `
            <h2>Contributors</h2>
            <ul>
                <li>Student Developer: Your Name</li>
                <li>Faculty Guide: Faculty Name</li>
                <li>Department: Mathematics / Computer Science</li>
            </ul>
        `;
    }

    else if (sectionName === "References") {
        contentArea.innerHTML = `
            <h2>References</h2>
            <ol>
                <li>Elementary Number Theory textbooks</li>
                <li>Euler's Totient Function study material</li>
                <li>Modular arithmetic examples and practice problems</li>
            </ol>
        `;
    }

    else if (sectionName === "Feedback") {
        contentArea.innerHTML = `
            <h2>Feedback</h2>
            <input id="studentName" placeholder="Enter your name"><br><br>
            <textarea id="feedbackText" placeholder="Write your feedback"></textarea><br><br>
            <button onclick="submitFeedback()">Submit Feedback</button>
            <p id="feedbackResult"></p>
        `;
    }
}

sectionCards.forEach(card => {
    card.addEventListener("click", function () {
        const sectionName = this.querySelector("h3").innerText;
        showSection(sectionName);
    });
});

navItems.forEach(item => {
    item.addEventListener("click", function () {
        const sectionName = this.innerText.trim();
        showSection(sectionName);
    });
});

function checkPretest() {
    let score = 0;
    const answer1 = document.querySelector('input[name="pre1"]:checked');
    const answer2 = document.querySelector('input[name="pre2"]:checked');

    if (answer1 && answer1.value === "4") score++;
    if (answer2 && answer2.value === "coprime") score++;

    document.getElementById("pretestResult").innerText = `Your score is ${score}/2`;
}

function checkPosttest() {
    let score = 0;
    const answer1 = document.querySelector('input[name="post1"]:checked');
    const answer2 = document.querySelector('input[name="post2"]:checked');

    if (answer1 && answer1.value === "1") score++;
    if (answer2 && answer2.value === "cryptography") score++;

    document.getElementById("posttestResult").innerText = `Your score is ${score}/2`;
}

function submitFeedback() {
    const name = document.getElementById("studentName").value.trim();
    const feedback = document.getElementById("feedbackText").value.trim();

    if (name === "" || feedback === "") {
        document.getElementById("feedbackResult").innerText = "Please enter your name and feedback.";
        return;
    }

    document.getElementById("feedbackResult").innerText = `Thank you, ${name}. Your feedback has been submitted.`;
}

/* CALCULATOR */
function gcd(a,b){
    return b===0?a:gcd(b,a%b);
}

function phi(n){
    let count=0;
    for(let i=1;i<n;i++){
        if(gcd(i,n)===1) count++;
    }
    return count;
}

function calculateEuler(){
    let a=parseInt(document.getElementById("a").value);
    let n=parseInt(document.getElementById("n").value);

    if (isNaN(a) || isNaN(n) || n <= 1) {
        document.getElementById("result").innerText = "Please enter valid numbers. n should be greater than 1.";
        return;
    }

    if(gcd(a,n)!==1){
        document.getElementById("result").innerText="Not applicable because a and n are not coprime.";
        return;
    }

    let p=phi(n);
    let res=1;

    for(let i=0;i<p;i++){
        res=(res*a)%n;
    }

    document.getElementById("result").innerHTML=
        `φ(${n})=${p}<br>${a}<sup>${p}</sup> mod ${n}=${res}`;
}

showSection("Aim");

</script>

</body>
</html>
